version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "40000-40100:40000-40100/udp"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MEDIASOUP_MIN_PORT=40000
      - MEDIASOUP_MAX_PORT=40100
    depends_on:
      - redis
    # 프로덕션: 빌드된 파일 실행
    command: npm start

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
